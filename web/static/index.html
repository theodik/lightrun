<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>lightrun</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script type="module" src="/static/vendor/datastar.js"></script>
  <style>
    :root {
      --pico-font-size: 96%;
      --pico-border-radius: 6px;
    }
    body {
      min-height: 100vh;
      background: #f8faf9;
      color: #18211f;
    }
    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding-block: 24px 40px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }
    h1 {
      margin: 0;
      font-size: 1.55rem;
      line-height: 1.15;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #1c8b57;
      box-shadow: 0 0 0 4px rgba(28,139,87,.14);
      display: inline-block;
      margin-right: 8px;
    }
    /* ── shared section shell ── */
    .shell {
      background: #fff;
      border: 1px solid #dfe7e3;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }
    .section-head h2 {
      margin: 0;
      font-size: 1.05rem;
    }
    .section-head a, .section-head button {
      width: auto;
      margin: 0;
      padding: 6px 14px;
      font-size: 0.85rem;
    }
    /* ── command list ── */
    #command-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .cmd-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 10px;
      border-radius: 6px;
      border: 1px solid #edf1ef;
      background: #fafcfb;
      transition: border-color .15s;
    }
    .cmd-item.cmd-running {
      border-color: #b8e6d0;
      background: #f4fcf8;
    }
    .cmd-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }
    .cmd-name {
      font-size: 0.97rem;
      color: #18211f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cmd-command {
      font-size: 0.78rem;
      color: #667772;
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cmd-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .cmd-actions .badge {
      font-size: 0.75rem;
    }
    .btn-run, .btn-view {
      width: auto;
      margin: 0;
      padding: 8px 16px;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .btn-view {
      background: transparent;
      border-color: #1c8b57;
      color: #1c8b57;
    }
    /* ── process table ── */
    .table-wrap {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    th {
      text-align: left;
      color: #5a6e69;
      font-weight: 600;
      padding: 6px 8px;
      border-bottom: 1px solid #dfe7e3;
      white-space: nowrap;
    }
    td {
      padding: 8px;
      border-bottom: 1px solid #f0f4f2;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    small { color: #8a9e99; display: block; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .badge-running   { background: #dcf5ea; color: #1c6b45; }
    .badge-stopped   { background: #f0f0ef; color: #555; }
    .badge-healthy   { background: #dcf5ea; color: #1c6b45; }
    .badge-unhealthy { background: #fde8e3; color: #8a2f18; }
    .badge-starting  { background: #fef6dc; color: #7a5c00; }
    .actions {
      display: flex;
      gap: 6px;
      min-width: 200px;
    }
    .actions button {
      width: auto;
      margin: 0;
      padding: 5px 10px;
      font-size: 0.8rem;
    }
    .logs-row pre {
      max-height: 320px;
      margin: 0;
      overflow: auto;
      white-space: pre-wrap;
      background: #101615;
      color: #d7efe5;
      border-radius: 6px;
      padding: 12px;
      font-size: 0.8rem;
    }
    .empty {
      color: #667772;
      text-align: center;
      padding-block: 24px;
      font-size: 0.9rem;
    }
    #message {
      min-height: 1.4rem;
      margin: 8px 0 0;
      color: #8a2f18;
      font-size: 0.88rem;
    }
    @media (max-width: 720px) {
      main { width: calc(100% - 20px); padding-top: 14px; }
      header, .section-head { align-items: flex-start; flex-direction: column; }
      .cmd-item { flex-direction: column; align-items: flex-start; }
      .cmd-actions { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body data-init="@get('/api/events')">
  <main>
    <header>
      <h1><span class="status-dot" aria-hidden="true"></span>lightrun</h1>
      <small>Dashboard</small>
    </header>

    <!-- Commands section -->
    <section class="shell">
      <div class="section-head">
        <h2>Commands</h2>
        <a href="/start" role="button">+ Register</a>
      </div>
      <div id="command-list">
        <p class="empty">Loading…</p>
      </div>
    </section>

    <!-- Ad-hoc processes section -->
    <section class="shell">
      <div class="section-head">
        <h2>Processes</h2>
        <button type="button" class="secondary" id="refresh">Refresh</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Subdomain</th>
              <th>Gateway</th>
              <th>Port</th>
              <th>Status</th>
              <th>Health</th>
              <th>URL</th>
              <th>Uptime</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="process-rows">
            <tr><td colspan="8" class="empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>
      <div id="message" role="status"></div>
    </section>
  </main>

  <script>
    const message = document.querySelector('#message');

    function setMessage(text, isError = true) {
      message.textContent = text;
      message.style.color = isError ? '#8a2f18' : '#1c6b45';
    }

    async function request(path, options = {}) {
      const res = await fetch(path, {
        headers: {'Content-Type': 'application/json', ...(options.headers || {})},
        ...options
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || res.statusText);
      return data;
    }

    // Run a named command, redirect to its detail page.
    async function runCommand(subdomain) {
      try {
        setMessage('Starting…', false);
        await request('/api/commands/' + encodeURIComponent(subdomain) + '/run', {method: 'POST', body: '{}'});
        window.location.assign('/commands/' + encodeURIComponent(subdomain));
      } catch (err) {
        setMessage(err.message);
      }
    }

    // Delegated handler for command list Run buttons.
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('.btn-run');
      if (!btn || !btn.closest('#command-list')) return;
      runCommand(btn.dataset.subdomain);
    });

    // Delegated handler for process table action buttons.
    document.querySelector('table').addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      const {action, id} = btn.dataset;
      try {
        if (action === 'logs') {
          const row = document.getElementById('logs-' + id);
          const pre = document.getElementById('log-text-' + id);
          if (!row.hidden) {
            row.hidden = true;
            return;
          }
          const data = await request('/api/processes/' + encodeURIComponent(id) + '/logs?lines=200');
          pre.textContent = data.lines.length ? data.lines.join('\n') : 'No logs.';
          row.hidden = false;
        } else {
          await request('/api/processes/' + encodeURIComponent(id) + '/' + action, {method: 'POST', body: '{}'});
          setMessage(action + ' requested.', false);
        }
      } catch (err) {
        setMessage(err.message);
      }
    });

    document.getElementById('refresh').addEventListener('click', () => {
      window.location.reload();
    });

  </script>
</body>
</html>
